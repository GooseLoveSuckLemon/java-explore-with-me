server.port=9090
spring.application.name=stats-server

spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://stats-db:5432/ewm-stats
spring.datasource.username=stats-user
spring.datasource.password=stats-password

spring.jpa.database=POSTGRESQL
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=true

spring.sql.init.mode=always
spring.sql.init.platform=postgres

logging.level.ru.practicum=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG

management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always