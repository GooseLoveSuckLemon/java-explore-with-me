spring.web.resources.add-mappings=false

# Остальные настройки
server.port=8080
spring.application.name=main-server

spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://localhost:5432/ewm-stats
spring.datasource.username=stats-user
spring.datasource.password=passwd

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# Отключаем автоматическое добавление слэшей
spring.mvc.pathmatch.matching-strategy=ant_path_matcher
spring.mvc.throw-exception-if-no-handler-found=true

# Для обработки статики
spring.mvc.static-path-pattern=/static/**

spring.sql.init.mode=never

stats-server.url=http://localhost:9090

logging.level.ru.practicum=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate=INFO

management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

spring.jackson.time-zone=UTC
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss